version: '3.9'
  
services:
  mongodb:
    image: 'mongo'
    container_name: mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=refpx
      - MONGO_INITDB_ROOT_PASSWORD=refpx123
      - MONGO_INITDB_DATABASE=example
    volumes:
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
      - ./mongo-volume:/data/db
    ports:
      - '27017:27017'
